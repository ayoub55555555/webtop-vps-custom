herename: Build and Push Docker Image to GHCR

# متى يتم تشغيل هذا الكود؟ (عند الدفع إلى مسار main)
on:
  push:
    branches:
      - main
  # يسمح لك بتشغيل البناء يدوياً من واجهة GitHub
  workflow_dispatch:

env:
  # رابط مساحة تخزين حاويات GitHub
  REGISTRY: ghcr.io
  # اسم الصورة سيكون (اسم_المستخدم/اسم_المستودع)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # إعطاء الصلاحيات اللازمة لرفع الصورة
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # هذا التوكن يوفره GitHub تلقائياً، لا تحتاج لإنشائه بنفسك
          password: ${{ secrets.GITHUB_TOKEN }}

      # تحويل اسم المستودع إلى حروف صغيرة (لأن Docker يرفض الحروف الكبيرة)
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # سيقوم بتسمية الصورة بـ main أو latest
          tags: |
            type=raw,value=latest
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
