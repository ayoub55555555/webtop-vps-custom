version: "3"
services:
  webtop:
    image: ghcr.io/ayoub55555555/webtop-vps-custom:main
    container_name: webtop-vps
    privileged: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - ./config:/config
    ports:
      - 3000:3000
      - 3001:3001
      - 2222:22
    restart: unless-stopped
